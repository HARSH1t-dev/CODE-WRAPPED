<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Wrapped</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landing-screen" class="container">
        <h1 class="title">Code Wrapped</h1>
        <p class="subtitle">Discover your coding journey this year.</p>
        
        <div class="input-group">
            <input type="text" id="leetcode-username" placeholder="LeetCode Username">
            <input type="text" id="codeforces-handle" placeholder="Codeforces Handle">
        </div>
        
        <button id="fetch-btn">Show My Wrapped</button>
        <div id="error-message" class="hidden"></div>
    </div>

    <div id="wrapped-container" class="hidden">
        <div id="progress-bars-container"></div>
        
        <div id="slides-container" onclick="nextSlide()">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
